    <style>
        svg {
            --color: hsla(35, 34%, 50%, .5);
            --color-x: hsla(35, 34%, 50%, 1);
        }

        .shape-line {
            stroke-width: .5px;
            stroke: var(--color-x);
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-miterlimit: 1.5;
            fill: none;
            mix-blend-mode: multiply;
        }

        .shape-fill {
            mix-blend-mode: multiply;
            fill: var(--color);
            transition: fill 0.5s;
            fill-rule: evenodd;
            clip-rule: evenodd;
        }

        .shape-fill:hover {
            --color: hsla(150, 80%, 40%, 0.75);
        }

